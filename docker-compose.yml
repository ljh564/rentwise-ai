services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rentscout:rentscout_dev@postgres:5432/rentscout
      REDIS_URL: redis://redis:6379/0
      CHECKPOINT_DATABASE_URL: postgresql://rentscout:rentscout_dev@postgres:5432/rentscout
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rentscout
      POSTGRES_USER: rentscout
      POSTGRES_PASSWORD: rentscout_dev
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentscout -d rentscout"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data:
